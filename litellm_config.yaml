model_list:
  # --- チャット・推論モデル（クラウド） ---
  # Gemini 1.5 Pro
  - model_name: gemini-1.5-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: "os.environ/GEMINI_API_KEY"

  # Gemini 1.5 Flash (より高速な動作が必要な場合)
  - model_name: gemini-1.5-flash
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: "os.environ/GEMINI_API_KEY"

  # --- チャット・推論モデル（ローカル Ollama フォールバック用） ---
  - model_name: local-ollama-chat
    litellm_params:
      model: ollama/qwen3.5:latest
      api_base: "http://host.docker.internal:11434"

  # --- 日本語特化型 Embedding モデル（ローカル） ---
  # embedding_jp_api へのルーティング設定
  # ルール: model_name は HuggingFace モデルID をそのまま使用する
  #   → EMBED_MODEL 環境変数の値と一致させることで混乱を防ぐ
  # ruri-v3-30m: ModernBERT-Jaベース・30Mパラメータ・最大8192トークン対応・出力次元256
  - model_name: cl-nagoya/ruri-v3-30m
    litellm_params:
      model: openai/cl-nagoya/ruri-v3-30m
      # docker-compose 内でのコンテナ間通信 URL
      api_base: "http://embedding-jp-api:8000/v1"
      # ローカル API なので認証キーは任意（不要）
      api_key: "not-needed"
