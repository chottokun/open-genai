model_list:
  # =========================================================================
  #  チャット推論モデル (2026年最新)
  # =========================================================================

  # --- Google Gemini ---
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: "os.environ/GEMINI_API_KEY"

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY"

  - model_name: gemini-3.5-flash
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: "os.environ/GEMINI_API_KEY"

  # --- OpenAI ---
  # - model_name: gpt-4.5
  #   litellm_params:
  #     model: openai/gpt-4.5
  #     api_key: "os.environ/OPENAI_API_KEY"

  # --- Azure AI Foundry (Claude) ---
  # - model_name: claude-sonnet
  #   litellm_params:
  #     model: azure_ai/claude-sonnet-4-5
  #     api_base: "os.environ/AZURE_AI_API_BASE"
  #     api_key: "os.environ/AZURE_AI_API_KEY"

  # --- さくら AI Engine（国内完結・OpenAI互換） ---
  - model_name: sakura-gpt-oss-120b
    litellm_params:
      model: gpt-oss-120b
      custom_llm_provider: openai
      api_base: "os.environ/SAKURA_AI_API_BASE"
      api_key: "os.environ/SAKURA_AI_API_KEY"

  - model_name: sakura-qwen3-coder
    litellm_params:
      model: Qwen3-Coder-480B-A35B-Instruct-FP8
      custom_llm_provider: openai
      api_base: "os.environ/SAKURA_AI_API_BASE"
      api_key: "os.environ/SAKURA_AI_API_KEY"
  # --- 汎用 OpenAI 互換 (OpenAI Compatible) エンドポイント ---
  - model_name: openai-compatible-chat
    litellm_params:
      model: "os.environ/OPENAI_COMPATIBLE_MODEL"
      custom_llm_provider: openai
      api_base: "os.environ/OPENAI_COMPATIBLE_API_BASE"
      api_key: "os.environ/OPENAI_COMPATIBLE_API_KEY"

  # --- ローカル Ollama (Gemma 4 8B 最新) ---
  - model_name: gemma4
    litellm_params:
      model: ollama/gemma4:latest
      api_base: "http://host.docker.internal:11434"

  # =========================================================================
  #  日本語特化型 Embedding モデル（ローカル）
  # =========================================================================
  - model_name: cl-nagoya/ruri-v3-30m
    litellm_params:
      model: openai/cl-nagoya/ruri-v3-30m
      api_base: "http://embedding-jp-api:8000/v1"
      api_key: "not-needed"

  # =========================================================================
  #  音声認識（Whisper / Transcription）
  # =========================================================================
  # # OpenAI gpt-4o-transcribe
  # - model_name: whisper-cloud
  #   litellm_params:
  #     model: openai/gpt-4o-transcribe
  #     api_key: "os.environ/OPENAI_API_KEY"
  #     model_info:
  #       mode: audio_transcription

  # =========================================================================
  #  画像生成
  # =========================================================================
  # # Google Imagen 4
  # - model_name: imagen-4
  #   litellm_params:
  #     model: gemini/imagen-4.0-generate-001
  #     api_key: "os.environ/GEMINI_API_KEY"
  #   model_info:
  #     mode: image_generation

# =========================================================================
#  フォールバック / ルーティング設定
# =========================================================================
litellm_settings:
  num_retries: 2
  request_timeout: 120
  fallbacks:
    - {"gemini-2.5-pro": ["gemma4"]}
    - {"gemini-2.5-flash": ["gemma4"]}
    - {"gemini-3.5-flash": ["gemma4"]}
  drop_params: true  # プロバイダ間で非互換なパラメータを自動除去

  # --- ガードレール / コンテンツモデレーション設定 ---
  # OpenAI Moderation を使用する場合（OPENAI_API_KEYが必要なためコメントアウト）
  # guardrails:
  #   - guardrail_name: "openai-content-mod"
  #     litellm_params:
  #       guardrail: "openai_moderation"
  #       mode: "pre_call"
  #       api_key: "os.environ/OPENAI_API_KEY"

router_settings:
  routing_strategy: "simple-shuffle"
  model_group_alias:
    # 画面側が古いモデル名でリクエストしてきた場合の最新モデルへのエイリアス
    "gemini-1.5-pro": "gemini-2.5-pro"
    "gemini-1.5-flash": "gemini-3.5-flash"
    "local-ollama-chat": "gemma4"
    "gpt-oss:20b": "gemma4"
    "gemma3:27b": "gemma4"
